name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: |
          set -euo pipefail
          # shellcheck resolves ../ from cwd unless you -P; otherwise it looks in the wrong parish
          shellcheck -P bin -x bin/ripperoni
          shellcheck -P doctor -x doctor/checks.sh # doctor gets the same ../ treatment, different hat
          find lib -name '*.sh' -print0 | xargs -0 -r shellcheck
